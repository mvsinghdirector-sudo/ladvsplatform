stages:
  - build
  - test
  - docker
  - deploy-dev
  - deploy-uat
  - deploy-prod

variables:
  ACR_REGISTRY: acrladvs.azurecr.io
  IMAGE_NAME: applicant-service
  DOTNET_VERSION: "10.0"

# ─── BUILD ───────────────────────────────────
build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - cd services/applicant-service/ApplicantService/ApplicantService
    - dotnet restore
    - dotnet build --configuration Release
  only:
    - main
    - develop
    - uat

# ─── TEST ────────────────────────────────────
test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - cd services/applicant-service/ApplicantService/ApplicantService
    - dotnet restore
    - dotnet test --configuration Release
  only:
    - main
    - develop
    - uat

# ─── DOCKER BUILD & PUSH TO ACR ──────────────
docker-build:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  script:
    - echo $ACR_PASSWORD | docker login $ACR_REGISTRY
        -u $ACR_USERNAME --password-stdin
    - docker build
        -t $ACR_REGISTRY/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA
        -f services/applicant-service/ApplicantService/ApplicantService/Dockerfile .
    - docker push $ACR_REGISTRY/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA
  only:
    - main
    - develop

# ─── DEPLOY TO DEV ───────────────────────────
deploy-dev:
  stage: deploy-dev
  image: bitnami/kubectl:latest
  script:
    - kubectl config use-context $KUBE_CONTEXT_DEV
    - kubectl set image deployment/applicant-service
        applicant-service=$ACR_REGISTRY/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA
        -n dev
  only:
    - develop

# ─── DEPLOY TO UAT ───────────────────────────
deploy-uat:
  stage: deploy-uat
  image: bitnami/kubectl:latest
  script:
    - kubectl config use-context $KUBE_CONTEXT_UAT
    - kubectl set image deployment/applicant-service
        applicant-service=$ACR_REGISTRY/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA
        -n uat
  only:
    - uat
  when: manual

# ─── DEPLOY TO PROD ──────────────────────────
deploy-prod:
  stage: deploy-prod
  image: bitnami/kubectl:latest
  script:
    - kubectl config use-context $KUBE_CONTEXT_PROD
    - kubectl set image deployment/applicant-service
        applicant-service=$ACR_REGISTRY/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA
        -n prod
  only:
    - main
  when: manual