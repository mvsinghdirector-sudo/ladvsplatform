name: LADVS CI/CD Pipeline

on:
  push:
    branches: [main, develop, uat]

jobs:
  build-applicant-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - name: Restore ApplicantService
        run: dotnet restore services/applicant-service/ApplicantService/ApplicantService/ApplicantService.csproj
      - name: Build ApplicantService
        run: dotnet build services/applicant-service/ApplicantService/ApplicantService/ApplicantService.csproj --configuration Release

  build-application-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - name: Restore ApplicationService
        run: dotnet restore services/application-service/ApplicationService/ApplicationService/ApplicationService.csproj
      - name: Build ApplicationService
        run: dotnet build services/application-service/ApplicationService/ApplicationService/ApplicationService.csproj --configuration Release

  build-document-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - name: Restore DocumentService
        run: dotnet restore services/document-service/DocumentService/DocumentService/DocumentService.csproj
      - name: Build DocumentService
        run: dotnet build services/document-service/DocumentService/DocumentService/DocumentService.csproj --configuration Release

  build-admin-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - name: Restore AdminService
        run: dotnet restore services/admin-service/AdminService/AdminService/AdminService.csproj
      - name: Build AdminService
        run: dotnet build services/admin-service/AdminService/AdminService/AdminService.csproj --configuration Release

  build-notification-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - name: Restore NotificationService
        run: dotnet restore services/notification-service/NotificationService/NotificationService/NotificationService.csproj
      - name: Build NotificationService
        run: dotnet build services/notification-service/NotificationService/NotificationService/NotificationService.csproj --configuration Release

  docker-applicant-service:
    runs-on: ubuntu-latest
    needs: build-applicant-service
    steps:
      - uses: actions/checkout@v4
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: acrladvs.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and Push ApplicantService
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/applicant-service/ApplicantService/ApplicantService/dockerfile
          push: true
          tags: acrladvs.azurecr.io/applicant-service:${{ github.sha }}

  docker-application-service:
    runs-on: ubuntu-latest
    needs: build-application-service
    steps:
      - uses: actions/checkout@v4
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: acrladvs.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and Push ApplicationService
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/application-service/ApplicationService/ApplicationService/dockerfile
          push: true
          tags: acrladvs.azurecr.io/application-service:${{ github.sha }}

  docker-document-service:
    runs-on: ubuntu-latest
    needs: build-document-service
    steps:
      - uses: actions/checkout@v4
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: acrladvs.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and Push DocumentService
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/document-service/DocumentService/DocumentService/dockerfile
          push: true
          tags: acrladvs.azurecr.io/document-service:${{ github.sha }}

  docker-admin-service:
    runs-on: ubuntu-latest
    needs: build-admin-service
    steps:
      - uses: actions/checkout@v4
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: acrladvs.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and Push AdminService
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/admin-service/AdminService/AdminService/dockerfile
          push: true
          tags: acrladvs.azurecr.io/admin-service:${{ github.sha }}

  docker-notification-service:
    runs-on: ubuntu-latest
    needs: build-notification-service
    steps:
      - uses: actions/checkout@v4
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: acrladvs.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and Push NotificationService
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/notification-service/NotificationService/NotificationService/dockerfile
          push: true
          tags: acrladvs.azurecr.io/notification-service:${{ github.sha }}