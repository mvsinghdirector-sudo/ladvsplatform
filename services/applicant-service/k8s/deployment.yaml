apiVersion: apps/v1
kind: Deployment
metadata:
  name: application-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: application-service
  template:
    metadata:
      labels:
        app: application-service
    spec:
      containers:
      - name: application-service
        image: acrladvs.azurecr.io/application-service:latest
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"
---
apiVersion: v1
kind: Service
metadata:
  name: application-service
  namespace: dev
spec:
  selector:
    app: application-service
  ports:
  - port: 80
    targetPort: 8080
  type: LoadBalancer